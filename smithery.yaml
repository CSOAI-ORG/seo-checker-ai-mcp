name: seo-checker-ai-mcp
description: MEOK AI Labs MCP Server
version: 1.0.0
tools:
- name: analyze_title
  description: Analyze a page title for SEO best practices.
  parameters:
  - name: title
    type: string
    required: true
  - name: target_keyword
    type: string
    required: false
- name: check_meta_description
  description: Check a meta description for SEO best practices.
  parameters:
  - name: description
    type: string
    required: true
  - name: target_keyword
    type: string
    required: false
- name: validate_schema_markup
  description: Validate JSON-LD structured data/schema markup.
  parameters:
  - name: json_ld
    type: string
    required: true
- name: heading_analysis
  description: Analyze heading structure for SEO optimization.
  parameters:
  - name: html
    type: string
    required: true
  - name: target_keyword
    type: string
    required: false
